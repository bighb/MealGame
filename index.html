<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>今天吃什么？</title>

  <!-- TailwindCSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- GSAP -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

  <!-- Canvas Confetti -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

  <!-- 自定义样式 -->
  <link rel="stylesheet" href="style.css">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Noto Sans SC', 'sans-serif'],
          },
        },
      },
    }
  </script>
</head>
<body class="min-h-screen overflow-hidden font-sans">

  <!-- 背景 -->
  <div id="bg" class="fixed inset-0 bg-gradient-to-br from-orange-400 via-pink-400 to-purple-500 transition-colors duration-1000"></div>

  <!-- 浮动食物装饰 -->
  <div id="floating-foods" class="fixed inset-0 pointer-events-none z-0"></div>

  <!-- 主容器 -->
  <div id="app" class="relative z-10 min-h-screen flex flex-col items-center justify-center p-4">

    <!-- 标题 -->
    <h1 id="title" class="text-4xl md:text-6xl font-black text-white mb-2 title-shadow opacity-0">
      今天吃什么？
    </h1>
    <p id="subtitle" class="text-lg md:text-xl text-white/80 mb-8 opacity-0">
      点击下方按钮，让命运决定你的午餐 🍽️
    </p>

    <!-- 滚动选择区域 -->
    <div id="roller-container" class="relative w-full max-w-md mb-8 opacity-0">
      <!-- 高亮框 -->
      <div class="absolute inset-x-0 top-1/2 -translate-y-1/2 h-20 md:h-24 z-20 pointer-events-none">
        <div class="w-full h-full border-4 border-white/60 rounded-2xl bg-white/10 backdrop-blur-sm"></div>
      </div>

      <!-- 滚动槽 -->
      <div id="roller-viewport" class="relative h-64 md:h-72 overflow-hidden rounded-2xl bg-white/20 backdrop-blur-md border border-white/30">
        <div id="roller-track" class="absolute inset-x-0 flex flex-col items-center">
          <!-- 选项将通过 JS 动态生成 -->
        </div>
      </div>

      <!-- 顶部渐变遮罩 -->
      <div class="absolute inset-x-0 top-0 h-24 bg-gradient-to-b from-black/20 to-transparent rounded-t-2xl pointer-events-none z-10"></div>
      <!-- 底部渐变遮罩 -->
      <div class="absolute inset-x-0 bottom-0 h-24 bg-gradient-to-t from-black/20 to-transparent rounded-b-2xl pointer-events-none z-10"></div>
    </div>

    <!-- 结果展示 -->
    <div id="result" class="hidden mb-8">
      <div id="result-card" class="bg-white/95 backdrop-blur-xl rounded-3xl p-8 shadow-2xl transform scale-0">
        <div id="result-emoji" class="text-8xl mb-4 text-center"></div>
        <div id="result-text" class="text-3xl font-bold text-gray-800 text-center mb-2"></div>
        <div id="result-sub" class="text-gray-500 text-center"></div>
      </div>
    </div>

    <!-- 按钮 -->
    <button id="spin-btn"
      class="relative px-12 py-5 text-xl font-bold text-white rounded-full
             bg-gradient-to-r from-yellow-400 via-red-500 to-pink-500
             shadow-lg shadow-red-500/30
             hover:shadow-xl hover:shadow-red-500/40
             active:scale-95 transform transition-all duration-200
             opacity-0 overflow-hidden group">
      <span class="relative z-10">🎲 开始选择</span>
      <div class="absolute inset-0 bg-gradient-to-r from-pink-500 via-red-500 to-yellow-400 opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
    </button>

    <!-- 重新开始按钮 -->
    <button id="retry-btn"
      class="hidden mt-4 px-8 py-3 text-lg font-medium text-white/80 rounded-full
             border-2 border-white/30 hover:bg-white/10
             transform transition-all duration-200 active:scale-95">
      🔄 再来一次
    </button>

    <!-- 底部提示 -->
    <p id="footer-tip" class="mt-8 text-sm text-white/50 opacity-0">
      长按食物可以编辑菜单哦 ✏️
    </p>
  </div>

  <!-- 编辑弹窗 -->
  <div id="edit-modal" class="fixed inset-0 z-50 hidden">
    <div class="absolute inset-0 bg-black/50 backdrop-blur-sm" id="modal-backdrop"></div>
    <div class="absolute inset-x-4 top-1/2 -translate-y-1/2 max-w-md mx-auto bg-white rounded-3xl p-6 shadow-2xl transform scale-0" id="modal-content">
      <h2 class="text-2xl font-bold text-gray-800 mb-4">编辑菜单 🍽️</h2>
      <div id="food-list" class="max-h-80 overflow-y-auto space-y-2 mb-4">
        <!-- 食物列表 -->
      </div>
      <div class="flex gap-2">
        <input id="new-food-input" type="text" placeholder="添加新食物..."
          class="flex-1 px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-purple-400">
        <button id="add-food-btn" class="px-6 py-3 bg-purple-500 text-white rounded-xl font-medium hover:bg-purple-600 active:scale-95 transform transition-all">
          添加
        </button>
      </div>
      <button id="close-modal-btn" class="w-full mt-4 py-3 text-gray-500 font-medium hover:text-gray-700 transition-colors">
        完成
      </button>
    </div>
  </div>

  <script src="foods.js"></script>
  <script src="roller.js"></script>
  <script src="app.js"></script>
</body>
</html>
